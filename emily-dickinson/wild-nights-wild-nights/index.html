<title>Wild Nights — Wild Nights!</title>
<h1>Wild Nights — Wild Nights!</h1>
<pre>
Wild Nights — Wild Nights!
Were I with thee
Wild Nights should be
Our luxury!

Futile — the winds —
To a Heart in port —
Done with the Compass —
Done with the Chart!

Rowing in Eden —
Ah, the Sea!
Might I moor — Tonight —
In Thee!
</pre>
