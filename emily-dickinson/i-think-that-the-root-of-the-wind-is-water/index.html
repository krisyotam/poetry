<title>I think that the Root of the Wind is Water --</title>
<h1>I think that the Root of the Wind is Water --</h1>
<pre>
I think that the Root of the Wind is Water --
It would not sound so deep
Were it a Firmamental Product --
Airs no Oceans keep --
Mediterranean intonations --
To a Current's Ear --
There is a maritime conviction
In the Atmosphere --
</pre>
