<title>Which is the best -- the Moon or the Crescent?</title>
<h1>Which is the best -- the Moon or the Crescent?</h1>
<pre>
Which is the best -- the Moon or the Crescent?
Neither -- said the Moon --
That is best which is not -- Achieve it --
You efface the Sheen.

Not of detention is Fruition --
Shudder to attain.
Transport's decomposition follows --
He is Prism born.
</pre>
