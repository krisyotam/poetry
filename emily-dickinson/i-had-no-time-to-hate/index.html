<title>I had no time to Hate</title>
<h1>I had no time to Hate</h1>
<pre>
I had no time to Hate --
Because
The Grave would hinder Me --
And Life was not so
Ample I
Could finish -- Enmity --

Nor had I time to Love --
But since
Some Industry must be --
The little Toil of Love --
I thought
Be large enough for Me --
</pre>
