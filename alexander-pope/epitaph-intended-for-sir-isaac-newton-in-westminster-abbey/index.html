<title>Epitaph. Intended for Sir Isaac Newton, in Westminster Abbey.</title>
<h1>Epitaph. Intended for Sir Isaac Newton, in Westminster Abbey.</h1>
<pre>
    ISAACUS NEWTONUS:
    QUEM IMMORTALEM
TESTANTUR TEMPUS, NATURA, COELUM:
      MORTALEM
    HOC MARMOR FATETUR.

Nature and Nature's laws lay hid in night
God said, Let Newton be! and all was light.
</pre>
